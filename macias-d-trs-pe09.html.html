<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<title>Canvas Transforms Starter</title>
	<style>
	canvas{
		border:1px solid gray;
	}
	</style>
</head>
<body>
	<canvas width="640" height="480">
		Get a real browser!
	</canvas>
	<script>
		'use strict';	
        let ctx = document.querySelector('canvas').getContext('2d');
		let rotation = 0;
        let time = 0;
        loop();
	
		function loop(){
            requestAnimationFrame(loop);
            rotation += .05;
            time += .05;

            // Oscillates between -1 and 1
            let scale = 1 + Math.sin(time) * 0.5;
            let translate = 100 + Math.sin(time) * 50;

			// background
			ctx.fillStyle = 'yellow'; 
			ctx.fillRect(0,0,640,480); 
			
            // draw a "better" triangle - why is this better? You'll see!
            ctx.save();
			ctx.translate(500,100);
			ctx.rotate(rotation);
			ctx.scale(1.2,1.2);
            ctx.strokeStyle="red";
            ctx.fillStyle="red";
            ctx.lineWidth="5";
            ctx.beginPath();
            ctx.moveTo(0,-50);
            ctx.lineTo(50,50);
            ctx.lineTo(-50,50);
            ctx.closePath();
            ctx.stroke();
            ctx.restore();
			
            drawSquare2(ctx,200,100,100,100,rotation,"purple",0.75);
            drawSquare2(ctx,350,100,100,100,-rotation,"purple",0.5);
            drawSquare2(ctx,500,300,100,100,rotation,"purple",1.25);
            
            // draw triangle and star with helper functions
            drawTriangle(ctx,150,300,rotation,1.5,"magenta","pink",10);
            drawStar(ctx, translate, translate, 5, 50, 20, -rotation, scale, "cyan", "blue", 3);
            
			// do some transformations?
            ctx.save();
			ctx.translate(100,0);
			ctx.rotate(rotation);

			// set a bunch of state attributes
			ctx.shadowOffsetX = 15;
			ctx.shadowOffsetY = 15;
			ctx.shadowColor = "rgba(153,50,204,.6)";
			ctx.shadowBlur = 5;
            

			// draw squares with our helper function
			drawSquare1(ctx,100,0,100,100,"orange");
			drawSquare1(ctx,250,0,100,100,"orange");
			drawSquare1(ctx,400,0,100,100,"orange");
            
			// draw a triangle
			ctx.strokeStyle="pink";
			ctx.fillStyle="green";
			ctx.lineWidth="5";
			ctx.beginPath();
			ctx.moveTo(500,100);
			ctx.lineTo(550,200);
			ctx.lineTo(450,200);
			ctx.closePath();
            ctx.fill();
			ctx.stroke();

            ctx.restore();
            
		}
		
        // :(
            function drawSquare1(ctx,x,y,width,height,fillStyle){
                ctx.save();
                ctx.fillStyle=fillStyle;
                ctx.fillRect(x,y,width,height);
			ctx.restore();
		}

        //:0
        function drawSquare2(ctx,x,y,width,height,rotation,fillStyle,scale){
            ctx.save();
            ctx.fillStyle = fillStyle;
            ctx.translate(x, y);
            ctx.rotate(rotation);
            ctx.scale(scale, scale);
            // draw from center for correct rotation
            ctx.fillRect(0-width/2, 0-height/2, width, height); 
            ctx.restore();
        }

        function drawTriangle(ctx,x,y,rotation,scale,fillStyle,strokeStyle,lineWidth){
            ctx.save();  
			ctx.translate(x, y);
			ctx.rotate(rotation);
			ctx.scale(scale, scale);
            ctx.fillStyle = fillStyle;
            ctx.strokeStyle = strokeStyle;
            ctx.lineWidth = lineWidth / scale;
            ctx.beginPath();
            ctx.moveTo(0,-50);
            ctx.lineTo(50,50);
            ctx.lineTo(-50,50);
            ctx.closePath();
            ctx.fill();  
            ctx.stroke();
            ctx.restore();
        }

        function drawStar(ctx,x,y,points,outerRadius,innerRadius,rotation,scale,fillStyle,strokeStyle,lineWidth){
            ctx.save();  
			ctx.translate(x, y);
			ctx.rotate(rotation);
			ctx.scale(scale, scale);
            ctx.fillStyle = fillStyle;
            ctx.strokeStyle = strokeStyle;
            ctx.lineWidth = lineWidth / scale;
            ctx.beginPath();

            let angle = Math.PI / points;
            let currentAngle = -Math.PI / 2; 
            for(let i = 0; i < points * 2; i++){
                let radius = (i % 2 === 0) ? outerRadius : innerRadius;

                let xPos = Math.cos(currentAngle) * radius;
                let yPos = Math.sin(currentAngle) * radius;

                if(i === 0){
                    ctx.moveTo(xPos, yPos);
                } else {
                    ctx.lineTo(xPos, yPos);
                }

                currentAngle += angle;
            }
    
            ctx.closePath();
            ctx.fill();  
            ctx.stroke();
            ctx.restore();
        }
	</script>
</body>
</html>
